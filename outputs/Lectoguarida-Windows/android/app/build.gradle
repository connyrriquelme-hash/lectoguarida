plugins {
    id "com.android.application"
}

android {
    namespace "cl.lectoguarida.app"
    compileSdk 35

    defaultConfig {
        applicationId "cl.lectoguarida.app"
        minSdk 23
        targetSdk 35
        versionCode 12
        versionName "1.4.0-world-portals"
    }

    buildFeatures {
        buildConfig true
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation "androidx.webkit:webkit:1.12.1"
}
